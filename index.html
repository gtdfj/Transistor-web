
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transistor Radio - 本地版</title>
    
    <!-- 加载样式 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap');
        body {
            font-family: 'Roboto', sans-serif;
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes slide-up {
          from { transform: translateY(100%); }
          to { transform: translateY(0); }
        }
        @keyframes fade-in {
          from { opacity: 0; }
          to { opacity: 1; }
        }
        .animate-slide-up { animation: slide-up 0.3s ease-out; }
        .animate-fade-in { animation: fade-in 0.2s ease-out; }
        .rounded-inherit { border-radius: inherit; }
        
        /* Custom styles for search input focus */
        .search-input:focus-within {
            box-shadow: 0 0 0 2px var(--md-sys-color-primary);
        }
    </style>

    <!-- 加载 React 和 Babel (用于本地运行) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback, useMemo } = React;

        // --- 常量与配置 ---
        const THEME_PALETTES = {
            purple: { primary: '#6750A4', container: '#EADDFF', onContainer: '#21005D', surface: '#F7F2FA', border: '#E7E0EC', textSecondary: '#49454F', primaryActive: '#D0BCFF' },
            blue: { primary: '#0061A4', container: '#D1E4FF', onContainer: '#001D36', surface: '#F8FBFF', border: '#D1E4FF', textSecondary: '#49454F', primaryActive: '#A1C9FF' },
            green: { primary: '#006D32', container: '#98FB9D', onContainer: '#00210A', surface: '#F7FFF7', border: '#C0EED2', textSecondary: '#49454F', primaryActive: '#7CFF9A' },
            red: { primary: '#BA1A1A', container: '#FFDAD6', onContainer: '#410002', surface: '#FFF8F7', border: '#FFDAD6', textSecondary: '#49454F', primaryActive: '#FFB4AB' },
            orange: { primary: '#8B5000', container: '#FFDDB3', onContainer: '#2C1600', surface: '#FFF8F2', border: '#FFDDB3', textSecondary: '#49454F', primaryActive: '#FFB870' },
            black: { primary: '#FFFFFF', container: '#1C1B1F', onContainer: '#E6E1E5', surface: '#000000', border: '#313033', textSecondary: '#CAC4D0', primaryActive: '#FFFFFF' },
        };

        const Icons = {
            Radio: (props) => (
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
                    <circle cx="12" cy="12" r="2" />
                    <path d="M16.24 7.76a6 6 0 0 1 0 8.48" /><path d="M19.07 4.93a10 10 0 0 1 0 14.14" />
                    <path d="M7.76 16.24a6 6 0 0 1 0-8.48" /><path d="M4.93 19.07a10 10 0 0 1 0-14.14" />
                </svg>
            ),
            Plus: (props) => (
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
                    <line x1="12" y1="5" x2="12" y2="19" /><line x1="5" y1="12" x2="19" />
                </svg>
            ),
            Settings: (props) => (
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
                    <circle cx="12" cy="12" r="3" />
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z" />
                </svg>
            ),
            Play: (props) => (
                <svg viewBox="0 0 24 24" fill="currentColor" {...props}><path d="M8 5v14l11-7z" /></svg>
            ),
            Pause: (props) => (
                <svg viewBox="0 0 24 24" fill="currentColor" {...props}><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" /></svg>
            ),
            Star: (props) => (
                <svg viewBox="0 0 24 24" fill={props.active ? "currentColor" : "none"} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
                    <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" />
                </svg>
            ),
            Search: (props) => (
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
                    <circle cx="11" cy="11" r="8" /><line x1="21" y1="21" x2="16.65" y2="16.65" />
                </svg>
            ),
            ChevronLeft: (props) => (
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><polyline points="15 18 9 12 15 6" /></svg>
            ),
            Timer: (props) => (
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
                    <circle cx="12" cy="12" r="10" /><polyline points="12 6 12 12 16 14" />
                </svg>
            ),
            Edit: (props) => (
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" /><path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
                </svg>
            ),
            Share: (props) => (
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
                    <circle cx="18" cy="5" r="3" /><circle cx="6" cy="12" r="3" /><circle cx="18" cy="19" r="3" />
                    <line x1="8.59" y1="13.51" x2="15.42" y2="17.49" /><line x1="15.41" y1="6.51" x2="8.59" y2="10.49" />
                </svg>
            ),
            Trash: (props) => (
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
                    <polyline points="3 6 5 6 21 6" /><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
                </svg>
            ),
            Volume2: (props) => (
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
                    <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" />
                    <path d="M19.07 4.93a10 10 0 0 1 0 14.14" /><path d="M15.54 8.46a5 5 0 0 1 0 7.07" />
                </svg>
            ),
            Palette: (props) => (
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
                    <circle cx="13.5" cy="6.5" r=".5" fill="currentColor"/><circle cx="17.5" cy="10.5" r=".5" fill="currentColor"/><circle cx="8.5" cy="7.5" r=".5" fill="currentColor"/><circle cx="6.5" cy="12.5" r=".5" fill="currentColor"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.9 0 1.6-.4 2.1-1 .3-.4.6-.8 1-1 .4-.2.9-.3 1.4-.3 2.5 0 4.5-2 4.5-4.5 0-4.4-3.6-10.2-9-10.2z"/>
                </svg>
            ),
            Clock: (props) => (
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
                    <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
                </svg>
            ),
            X: (props) => (
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
                    <line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" />
                </svg>
            )
        };

        // --- 工具函数 ---
        const parseM3U = (content) => {
            const stations = [];
            const lines = content.split(/\r?\n/);
            let currentMeta = {};

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;

                if (line.startsWith('#EXTINF:')) {
                    // Extract name (last part after comma)
                    const commaIndex = line.lastIndexOf(',');
                    let name = commaIndex !== -1 ? line.substring(commaIndex + 1).trim() : '';
                    
                    // Extract attributes like tvg-logo
                    const logoMatch = line.match(/(?:tvg-logo|logo)="([^"]+)"/i);
                    const iconUrl = logoMatch ? logoMatch[1] : null;

                    currentMeta = { name, iconUrl };
                } else if (!line.startsWith('#')) {
                    // This is a URL
                    stations.push({
                        name: currentMeta.name || line.split('/').pop()?.split('?')[0] || '未知电台',
                        url: line,
                        iconUrl: currentMeta.iconUrl || null
                    });
                    currentMeta = {}; // Reset for next entry
                }
            }
            return stations;
        };

        // --- 主组件 ---
        const App = () => {
            const [stations, setStations] = useState([]);
            const [currentView, setCurrentView] = useState('LIST');
            const [activeStation, setActiveStation] = useState(null);
            const [isPlaying, setIsPlaying] = useState(false);
            const [isLoading, setIsLoading] = useState(false);
            const [settings, setSettings] = useState({
                themeColor: 'purple',
                showStreamUrl: true,
                iconStyle: 'circle',
                sleepTimerAction: 'pause',
            });
            const [sleepTimer, setSleepTimer] = useState(null);
            const [isTimerDialogOpen, setIsTimerDialogOpen] = useState(false);
            const [volume, setVolume] = useState(0.8);
            const [listSearchQuery, setListSearchQuery] = useState('');
            const [searchResults, setSearchResults] = useState([]);
            const [isSearching, setIsSearching] = useState(false);
            const [isSystemDark, setIsSystemDark] = useState(
                window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches
            );

            const audioRef = useRef(null);
            const sleepTimerRef = useRef(null);

            // 初始化
            useEffect(() => {
                const savedStations = localStorage.getItem('transistor_stations');
                if (savedStations) setStations(JSON.parse(savedStations));
                const savedSettings = localStorage.getItem('transistor_settings');
                if (savedSettings) setSettings(p => ({ ...p, ...JSON.parse(savedSettings) }));

                const darkModeMediaQuery = window.matchMedia('(prefers-color-scheme: dark)');
                const handleDarkModeChange = (e) => setIsSystemDark(e.matches);
                darkModeMediaQuery.addEventListener('change', handleDarkModeChange);
                return () => darkModeMediaQuery.removeEventListener('change', handleDarkModeChange);
            }, []);

            useEffect(() => localStorage.setItem('transistor_stations', JSON.stringify(stations)), [stations]);
            useEffect(() => localStorage.setItem('transistor_settings', JSON.stringify(settings)), [settings]);

            // 音频逻辑
            useEffect(() => {
                if (!audioRef.current) audioRef.current = new Audio();
                const audio = audioRef.current;
                audio.volume = volume;

                const onPlay = () => { setIsPlaying(true); setIsLoading(false); };
                const onPause = () => setIsPlaying(false);
                const onWaiting = () => setIsLoading(true);
                const onCanPlay = () => setIsLoading(false);
                const onError = (e) => { setIsPlaying(false); setIsLoading(false); };

                audio.addEventListener('play', onPlay);
                audio.addEventListener('pause', onPause);
                audio.addEventListener('waiting', onWaiting);
                audio.addEventListener('canplay', onCanPlay);
                audio.addEventListener('error', onError);

                return () => {
                    audio.removeEventListener('play', onPlay);
                    audio.removeEventListener('pause', onPause);
                    audio.removeEventListener('waiting', onWaiting);
                    audio.removeEventListener('canplay', onCanPlay);
                    audio.removeEventListener('error', onError);
                };
            }, [volume]);

            const togglePlay = useCallback(async (station) => {
                if (!audioRef.current) return;
                const audio = audioRef.current;

                if (station) {
                    if (activeStation?.id === station.id && isPlaying) {
                        audio.pause();
                    } else {
                        setActiveStation(station);
                        setIsLoading(true);
                        audio.src = station.url;
                        try {
                            await audio.play();
                        } catch (e) {
                            if (e.name !== 'AbortError') {
                                console.error("Playback failed:", e);
                            }
                        }
                    }
                } else if (activeStation) {
                    if (isPlaying) {
                        audio.pause();
                    } else {
                        setIsLoading(true);
                        try {
                            await audio.play();
                        } catch (e) {
                            if (e.name !== 'AbortError') {
                                console.error("Resume playback failed:", e);
                            }
                        }
                    }
                }
            }, [activeStation, isPlaying]);

            // 睡眠定时
            useEffect(() => {
                if (sleepTimer !== null && sleepTimer > 0) {
                    sleepTimerRef.current = window.setInterval(() => {
                        setSleepTimer(prev => {
                            if (prev && prev > 1) return prev - 1;
                            if (isPlaying && audioRef.current) audioRef.current.pause();
                            return null;
                        });
                    }, 60000);
                } else {
                    if (sleepTimerRef.current) window.clearInterval(sleepTimerRef.current);
                }
                return () => { if (sleepTimerRef.current) window.clearInterval(sleepTimerRef.current); };
            }, [sleepTimer, isPlaying]);

            // 电台操作
            const addStation = (s) => {
                const ns = { 
                    id: Date.now().toString() + Math.random().toString(36).substr(2, 5), 
                    name: s.name || '未知电台', 
                    url: s.url, 
                    iconUrl: s.iconUrl || null, 
                    isFavorite: false, 
                    addedAt: Date.now() 
                };
                setStations(prev => [...prev, ns]);
            };

            const addStations = (list) => {
                const ns = list.map(s => ({ 
                    id: Math.random().toString(36).substr(2, 9) + Date.now(), 
                    name: s.name, 
                    url: s.url, 
                    iconUrl: s.iconUrl || null,
                    isFavorite: false, 
                    addedAt: Date.now() 
                }));
                setStations(prev => [...prev, ...ns]);
                setCurrentView('LIST');
            };

            const toggleFavorite = (id) => setStations(prev => prev.map(s => s.id === id ? { ...s, isFavorite: !s.isFavorite } : s));
            const deleteStation = (id) => {
                setStations(prev => prev.filter(s => s.id !== id));
                if (activeStation?.id === id) { audioRef.current?.pause(); setActiveStation(null); }
            };

            const searchStations = async (q) => {
                if (!q) return;
                setIsSearching(true);
                try {
                    const res = await fetch(`https://de1.api.radio-browser.info/json/stations/byname/${encodeURIComponent(q)}?limit=20`);
                    const data = await res.json();
                    setSearchResults(data.map(s => ({ id: s.changeuuid, name: s.name, url: s.url_resolved, iconUrl: s.favicon, notes: s.country })));
                } catch (e) { console.error(e); } finally { setIsSearching(false); }
            };

            const activePalette = isSystemDark ? THEME_PALETTES['black'] : THEME_PALETTES[settings.themeColor];
            
            const filteredStations = useMemo(() => {
                if (!listSearchQuery) return stations;
                const query = listSearchQuery.toLowerCase();
                return stations.filter(s => s.name.toLowerCase().includes(query));
            }, [stations, listSearchQuery]);

            const sortedStations = useMemo(() => [...filteredStations].sort((a, b) => (b.isFavorite - a.isFavorite) || (b.addedAt - a.addedAt)), [filteredStations]);

            return (
                <div className="min-h-screen max-w-2xl mx-auto flex flex-col bg-surface transition-colors duration-500">
                    <style>{`
                        :root {
                            --md-sys-color-primary: ${activePalette.primary};
                            --md-sys-color-primary-container: ${activePalette.container};
                            --md-sys-color-on-primary-container: ${activePalette.onContainer};
                            --md-sys-color-surface: ${activePalette.surface};
                            --md-sys-color-border: ${activePalette.border};
                            --md-sys-color-text-secondary: ${activePalette.textSecondary};
                        }
                        body { background-color: var(--md-sys-color-surface); }
                        .text-primary { color: var(--md-sys-color-primary); }
                        .text-surface { color: var(--md-sys-color-surface); }
                        .bg-primary { background-color: var(--md-sys-color-primary); }
                        .bg-primaryContainer { background-color: var(--md-sys-color-primary-container); }
                        .text-onPrimaryContainer { color: var(--md-sys-color-on-primary-container); }
                        .bg-surface { background-color: var(--md-sys-color-surface); }
                        .border-theme { border-color: var(--md-sys-color-border); }
                        .bg-theme { background-color: var(--md-sys-color-border); }
                        .text-secondary { color: var(--md-sys-color-text-secondary); }
                        .accent-primary { accent-color: var(--md-sys-color-primary); }
                    `}</style>
                    
                    {/* Header */}
                    <div className="sticky top-0 z-20 flex flex-col bg-surface border-b border-theme shadow-sm">
                        <div className="flex items-center justify-between px-4 h-16">
                            <div className="flex items-center gap-4">
                                {currentView !== 'LIST' && <button onClick={() => setCurrentView('LIST')} className="p-2 text-primary"><Icons.ChevronLeft className="w-6 h-6" /></button>}
                                <h1 className="text-xl font-medium text-primary">{currentView === 'LIST' ? 'Transistor' : currentView === 'ADD' ? '添加电台' : '设置'}</h1>
                            </div>
                            {currentView === 'LIST' && (
                                <div className="flex gap-1">
                                    <button onClick={() => setCurrentView('ADD')} className="p-3 text-primary"><Icons.Plus className="w-6 h-6" /></button>
                                    <button onClick={() => setCurrentView('SETTINGS')} className="p-3 text-primary"><Icons.Settings className="w-6 h-6" /></button>
                                </div>
                            )}
                        </div>
                        
                        {currentView === 'LIST' && stations.length > 0 && (
                            <div className="px-4 pb-3">
                                <div className="relative group focus-within:ring-2 focus-within:ring-primary rounded-xl overflow-hidden transition-all duration-200">
                                    <Icons.Search className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-secondary opacity-60" />
                                    <input 
                                        type="text" 
                                        placeholder="搜索电台..." 
                                        className="w-full h-10 pl-10 pr-10 bg-theme/40 text-sm focus:outline-none focus:bg-theme/60 transition-colors"
                                        value={listSearchQuery}
                                        onChange={(e) => setListSearchQuery(e.target.value)}
                                    />
                                    {listSearchQuery && (
                                        <button 
                                            onClick={() => setListSearchQuery('')}
                                            className="absolute right-3 top-1/2 -translate-y-1/2 p-1 text-secondary opacity-60 hover:opacity-100"
                                        >
                                            <Icons.X className="w-4 h-4" />
                                        </button>
                                    )}
                                </div>
                            </div>
                        )}
                    </div>

                    <main className="flex-1 overflow-y-auto">
                        {currentView === 'LIST' && (
                            <div className="pb-24">
                                {stations.length === 0 ? (
                                    <div className="flex flex-col items-center justify-center py-24 px-8 text-center space-y-4">
                                        <div className="w-20 h-20 bg-theme rounded-full flex items-center justify-center"><Icons.Radio className="w-10 h-10 text-secondary" /></div>
                                        <p className="text-secondary">开启您的广播之旅</p>
                                        <button onClick={() => setCurrentView('ADD')} className="bg-primary text-surface px-8 py-3 rounded-full font-medium">添加电台</button>
                                    </div>
                                ) : (
                                    <>
                                        {sortedStations.length === 0 && listSearchQuery ? (
                                            <div className="flex flex-col items-center justify-center py-20 px-8 text-center space-y-3 opacity-60">
                                                <Icons.Search className="w-12 h-12 text-secondary" />
                                                <p className="text-sm">未找到名为 "{listSearchQuery}" 的电台</p>
                                            </div>
                                        ) : (
                                            <div className="divide-y border-theme">
                                                {sortedStations.map(s => (
                                                    <div key={s.id} onClick={() => togglePlay(s)} className="flex items-center gap-4 p-4 hover:bg-black/5 cursor-pointer transition-colors">
                                                        <div className={`w-12 h-12 bg-primaryContainer text-onPrimaryContainer flex items-center justify-center ${settings.iconStyle === 'circle' ? 'rounded-full' : 'rounded-lg'}`}>
                                                            {s.iconUrl ? <img src={s.iconUrl} className="w-full h-full object-cover rounded-inherit" onError={e=>e.target.style.display='none'} /> : <Icons.Radio className="w-6 h-6" />}
                                                        </div>
                                                        <div className="flex-1 min-w-0">
                                                            <h3 className="font-medium truncate text-primary">{s.name}</h3>
                                                            {settings.showStreamUrl && <p className="text-xs text-secondary truncate opacity-60">{s.url}</p>}
                                                        </div>
                                                        <div className="flex gap-1" onClick={e=>e.stopPropagation()}>
                                                            <button onClick={()=>toggleFavorite(s.id)} className={`p-2 ${s.isFavorite ? 'text-primary' : 'text-secondary'}`}><Icons.Star className="w-5 h-5" active={s.isFavorite}/></button>
                                                            <button onClick={()=>togglePlay(s)} className="p-2 text-primary">{activeStation?.id === s.id && isPlaying ? <Icons.Pause className="w-6 h-6"/> : <Icons.Play className="w-6 h-6"/>}</button>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </>
                                )}
                            </div>
                        )}

                        {currentView === 'ADD' && (
                            <AddView addStation={addStation} addStations={addStations} searchStations={searchStations} isSearching={isSearching} searchResults={searchResults} />
                        )}

                        {currentView === 'SETTINGS' && (
                            <SettingsView settings={settings} setSettings={setSettings} isSystemDark={isSystemDark} stations={stations} setStations={setStations} />
                        )}
                    </main>

                    {activeStation && (
                        <div onClick={() => setCurrentView('FULL_PLAYER')} className="fixed bottom-0 left-0 right-0 bg-primaryContainer text-onPrimaryContainer p-3 flex items-center justify-between z-30 shadow-lg border-t border-theme cursor-pointer transition-colors">
                            <div className="flex items-center gap-3 min-w-0">
                                <div className="w-10 h-10 bg-surface rounded-full flex items-center justify-center overflow-hidden border border-theme">
                                    {activeStation.iconUrl ? <img src={activeStation.iconUrl} className="w-full h-full object-cover" /> : <Icons.Radio className="w-5 h-5"/>}
                                </div>
                                <div className="min-w-0">
                                    <div className="text-sm font-medium truncate">{activeStation.name}</div>
                                    <div className="text-xs opacity-70">
                                        {isLoading ? '加载中...' : (isPlaying ? (sleepTimer ? `正在播放 · ${sleepTimer}m` : '正在播放') : '已暂停')}
                                    </div>
                                </div>
                            </div>
                            <div className="flex gap-2" onClick={e=>e.stopPropagation()}>
                                <button onClick={()=>setIsTimerDialogOpen(true)} className="p-2 relative">
                                    <Icons.Timer className={`w-6 h-6 ${sleepTimer?'text-primary':'opacity-60'}`}/>
                                    {sleepTimer && <span className="absolute -top-1 -right-1 bg-primary text-surface text-[8px] font-bold w-4 h-4 rounded-full flex items-center justify-center animate-pulse">{sleepTimer}</span>}
                                </button>
                                <button onClick={()=>togglePlay()} className="p-2 bg-primary text-surface rounded-full">{isPlaying?<Icons.Pause className="w-6 h-6"/>:<Icons.Play className="w-6 h-6"/>}</button>
                            </div>
                        </div>
                    )}

                    {currentView === 'FULL_PLAYER' && activeStation && (
                        <div className="fixed inset-0 bg-surface text-primary z-50 flex flex-col p-6 animate-slide-up overflow-hidden transition-colors">
                            <div className="flex justify-between items-center mb-8">
                                <button onClick={()=>setCurrentView('LIST')} className="p-2 text-primary"><Icons.ChevronLeft className="w-6 h-6"/></button>
                                <div className="text-center">
                                    <h2 className="font-medium">{activeStation.name}</h2>
                                    <p className="text-xs opacity-60 text-secondary">{isLoading ? '加载中...' : (sleepTimer ? `定时播放 · 剩余 ${sleepTimer} 分钟` : '已连接')}</p>
                                </div>
                                <button onClick={()=>deleteStation(activeStation.id)} className="p-2 text-red-500"><Icons.Trash className="w-6 h-6"/></button>
                            </div>
                            <div className="flex-1 flex flex-col items-center justify-center gap-12">
                                <div className={`w-64 h-64 bg-theme flex items-center justify-center shadow-2xl border border-theme ${settings.iconStyle==='circle'?'rounded-full':'rounded-3xl'}`}>
                                    {activeStation.iconUrl ? <img src={activeStation.iconUrl} className="w-full h-full object-cover rounded-inherit" /> : <Icons.Radio className="w-24 h-24 opacity-20 text-secondary"/>}
                                </div>
                                <button onClick={()=>togglePlay()} className="w-20 h-20 bg-primary text-surface rounded-full flex items-center justify-center shadow-lg transform active:scale-95 transition-transform overflow-hidden">
                                    {isPlaying ? <Icons.Pause className="w-10 h-10"/> : <Icons.Play className="w-10 h-10 ml-1.5"/>}
                                </button>
                                <div className="w-full max-w-xs flex items-center gap-4">
                                    <Icons.Volume2 className="w-5 h-5 opacity-60 text-secondary"/>
                                    <input type="range" min="0" max="1" step="0.01" value={volume} onChange={e=>setVolume(parseFloat(e.target.value))} className="flex-1 accent-primary h-1 bg-theme rounded-full appearance-none" />
                                </div>
                            </div>
                            <div className="grid grid-cols-4 mt-auto py-4 border-t border-theme">
                                <button onClick={()=>setIsTimerDialogOpen(true)} className="flex flex-col items-center gap-1 p-2">
                                    <Icons.Timer className={`w-6 h-6 ${sleepTimer?'text-primary animate-pulse':'text-secondary'}`}/>
                                    <span className={`text-[10px] font-bold uppercase tracking-tighter ${sleepTimer ? 'text-primary' : 'text-secondary opacity-40'}`}>{sleepTimer ? `${sleepTimer}m` : '定时'}</span>
                                </button>
                                <button onClick={()=>toggleFavorite(activeStation.id)} className="flex flex-col items-center gap-1 p-2">
                                    <Icons.Star className={`w-6 h-6 ${activeStation.isFavorite?'text-yellow-500':'text-secondary'}`} active={activeStation.isFavorite}/>
                                    <span className={`text-[10px] font-bold uppercase tracking-tighter ${activeStation.isFavorite ? 'text-primary' : 'text-secondary opacity-40'}`}>收藏</span>
                                </button>
                                <button onClick={()=>{navigator.clipboard.writeText(activeStation.url); alert('URL已复制');}} className="flex flex-col items-center gap-1 p-2">
                                    <Icons.Share className="w-6 h-6 text-secondary"/>
                                    <span className="text-[10px] text-secondary opacity-40 uppercase font-bold tracking-tighter">分享</span>
                                </button>
                                <button onClick={()=>setCurrentView('LIST')} className="flex flex-col items-center gap-1 p-2">
                                    <Icons.Edit className="w-6 h-6 text-secondary"/>
                                    <span className="text-[10px] text-secondary opacity-40 uppercase font-bold tracking-tighter">列表</span>
                                </button>
                            </div>
                        </div>
                    )}

                    {isTimerDialogOpen && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 animate-fade-in bg-black/60 backdrop-blur-sm" onClick={()=>setIsTimerDialogOpen(false)}>
                            <div className="bg-surface w-full max-w-sm rounded-[28px] p-6 shadow-2xl space-y-6" onClick={e=>e.stopPropagation()}>
                                <div className="flex items-center gap-4 mb-2">
                                    <div className="w-12 h-12 bg-primaryContainer text-onPrimaryContainer rounded-full flex items-center justify-center">
                                        <Icons.Clock className="w-6 h-6" />
                                    </div>
                                    <div>
                                        <h3 className="text-xl font-medium text-primary">睡眠定时器</h3>
                                        <p className="text-sm text-secondary">设置后播放将自动停止</p>
                                    </div>
                                </div>

                                {sleepTimer ? (
                                    <div className="bg-primaryContainer/50 p-4 rounded-2xl flex items-center justify-between">
                                        <div className="text-primary font-medium">剩余时间: {sleepTimer} 分钟</div>
                                        <button onClick={()=>{setSleepTimer(null); setIsTimerDialogOpen(false);}} className="text-xs font-bold uppercase tracking-widest text-primary hover:underline">取消定时</button>
                                    </div>
                                ) : (
                                    <div className="grid grid-cols-4 gap-3">
                                        {[15, 30, 45, 60].map(m => (
                                            <button 
                                                key={m} 
                                                onClick={()=>{setSleepTimer(m); setIsTimerDialogOpen(false);}}
                                                className="h-12 bg-theme/50 hover:bg-primary hover:text-surface rounded-xl flex items-center justify-center text-sm font-bold transition-all"
                                            >
                                                {m}m
                                            </button>
                                        ))}
                                    </div>
                                )}

                                <div className="space-y-3 pt-2">
                                    <p className="text-[10px] font-black uppercase tracking-widest opacity-40">自定义时间 (分钟)</p>
                                    <div className="flex gap-2">
                                        <input 
                                            id="customTimerInput"
                                            type="number" 
                                            placeholder="输入分钟数" 
                                            className="flex-1 h-12 bg-theme/30 rounded-xl px-4 focus:outline-none text-primary"
                                        />
                                        <button 
                                            onClick={()=>{
                                                const val = parseInt(document.getElementById('customTimerInput').value);
                                                if(val > 0) { setSleepTimer(val); setIsTimerDialogOpen(false); }
                                            }}
                                            className="h-12 px-6 bg-primary text-surface rounded-xl font-bold uppercase text-xs"
                                        >
                                            设定
                                        </button>
                                    </div>
                                </div>

                                <div className="pt-2">
                                    <button onClick={()=>setIsTimerDialogOpen(false)} className="w-full h-12 border border-theme rounded-xl text-sm font-bold text-secondary uppercase tracking-widest">关闭</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const AddView = ({ addStation, addStations, searchStations, isSearching, searchResults }) => {
            const [tab, setTab] = useState('search');
            const [form, setForm] = useState({ name: '', url: '' });
            const [query, setQuery] = useState('');
            const [bulkText, setBulkText] = useState('');
            const [parsedCount, setParsedCount] = useState(0);

            useEffect(() => {
                if (tab === 'import' && bulkText) {
                    const count = parseM3U(bulkText).length;
                    setParsedCount(count);
                } else {
                    setParsedCount(0);
                }
            }, [bulkText, tab]);

            return (
                <div className="p-4 space-y-6">
                    <div className="flex bg-theme rounded-full p-1">
                        {['search', 'manual', 'import'].map(t => (
                            <button key={t} onClick={()=>setTab(t)} className={`flex-1 py-2 rounded-full text-xs font-bold uppercase transition-all ${tab===t?'bg-surface text-primary shadow-sm':'text-secondary'}`}>
                                {t==='search'?'搜索':t==='manual'?'手动':'批量'}
                            </button>
                        ))}
                    </div>

                    {tab==='search' && (
                        <div className="space-y-4">
                            <div className="relative">
                                <input type="text" placeholder="全球电台搜索..." className="w-full h-12 bg-theme rounded-xl px-10 focus:outline-none" value={query} onChange={e=>setQuery(e.target.value)} onKeyDown={e=>e.key==='Enter'&&searchStations(query)} />
                                <Icons.Search className="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 opacity-40" />
                                <button onClick={()=>searchStations(query)} className="absolute right-2 top-2 px-4 h-8 bg-primary text-surface rounded-lg text-xs font-bold">搜索</button>
                            </div>
                            <div className="space-y-2">
                                {isSearching ? <div className="text-center py-8 opacity-40">寻找中...</div> : searchResults.map(r => (
                                    <div key={r.id} className="flex items-center gap-3 p-3 bg-surface border border-theme rounded-xl">
                                        <div className="w-10 h-10 bg-theme rounded-lg overflow-hidden flex-shrink-0">
                                            <img src={r.iconUrl} className="w-full h-full object-cover" onError={e=>e.target.src=''} />
                                        </div>
                                        <div className="flex-1 min-w-0">
                                            <div className="text-sm font-medium truncate">{r.name}</div>
                                            <div className="text-[10px] opacity-40 truncate">{r.notes}</div>
                                        </div>
                                        <button onClick={()=>addStation(r)} className="p-2 text-primary"><Icons.Plus className="w-6 h-6"/></button>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {tab==='manual' && (
                        <div className="space-y-4">
                            <input placeholder="电台名称" className="w-full h-12 bg-theme rounded-xl px-4 focus:outline-none" value={form.name} onChange={e=>setForm({...form, name: e.target.value})} />
                            <input placeholder="播放链接 (URL)" className="w-full h-12 bg-theme rounded-xl px-4 focus:outline-none" value={form.url} onChange={e=>setForm({...form, url: e.target.value})} />
                            <button onClick={()=>{if(form.url){addStation(form); setForm({name:'',url:''});}}} className="w-full h-12 bg-primary text-surface rounded-xl font-bold uppercase tracking-widest">保存</button>
                        </div>
                    )}

                    {tab==='import' && (
                        <div className="space-y-4">
                            <textarea 
                                placeholder="粘贴 M3U 文本或直接输入 URL 列表..." 
                                className="w-full h-40 bg-theme rounded-xl p-4 focus:outline-none text-sm font-mono leading-relaxed" 
                                value={bulkText} 
                                onChange={e=>setBulkText(e.target.value)} 
                            />
                            <div className="flex items-center justify-between px-1">
                                <span className="text-[10px] opacity-40 font-bold uppercase">支持提取 Logo 图标</span>
                                {parsedCount > 0 && <span className="text-[10px] text-primary font-bold bg-primaryContainer px-2 py-0.5 rounded-full">检测到 {parsedCount} 个电台</span>}
                            </div>
                            <button 
                                onClick={()=>{
                                    const p = parseM3U(bulkText); 
                                    if(p.length) {
                                        addStations(p); 
                                        setBulkText('');
                                    } else {
                                        alert('未检测到有效内容');
                                    }
                                }} 
                                disabled={!parsedCount}
                                className={`w-full h-12 bg-primary text-surface rounded-xl font-bold uppercase tracking-widest transition-opacity ${!parsedCount ? 'opacity-50 grayscale' : 'opacity-100'}`}
                            >
                                导入选定的电台
                            </button>
                        </div>
                    )}
                </div>
            );
        };

        const SettingsView = ({ settings, setSettings, isSystemDark, stations, setStations }) => (
            <div className="p-4 space-y-8">
                <section>
                    <h2 className="text-[10px] font-black uppercase tracking-[0.2em] opacity-40 mb-4">外观配置</h2>
                    <div className="space-y-4">
                        <div className="flex gap-2 overflow-x-auto no-scrollbar pb-2">
                            {['purple', 'blue', 'green', 'red', 'orange'].map(c => (
                                <button key={c} onClick={()=>setSettings({...settings, themeColor: c})} className={`w-10 h-10 rounded-full border-2 ${settings.themeColor===c?'border-primary':'border-transparent'}`} style={{backgroundColor: THEME_PALETTES[c].primary}} />
                            ))}
                        </div>
                        <div className="flex items-center justify-between p-4 bg-theme/30 rounded-2xl">
                            <span className="text-sm font-medium">图标形状</span>
                            <button onClick={()=>setSettings({...settings, iconStyle: settings.iconStyle==='circle'?'square':'circle'})} className="px-4 py-2 bg-primaryContainer rounded-full text-xs font-bold">{settings.iconStyle==='circle'?'圆形':'方形'}</button>
                        </div>
                        {isSystemDark && <p className="text-[10px] italic opacity-40">检测到系统深色模式：已强制启用“黑色”主题。</p>}
                    </div>
                </section>
                <section>
                    <h2 className="text-[10px] font-black uppercase tracking-[0.2em] opacity-40 mb-4">数据管理</h2>
                    <div className="grid grid-cols-2 gap-3">
                        <button onClick={()=>{
                            const blob = new Blob([JSON.stringify(stations)], {type:'application/json'});
                            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'radio_backup.json'; a.click();
                        }} className="flex flex-col items-center gap-2 p-4 bg-theme rounded-2xl"><Icons.Share className="w-6 h-6 opacity-40"/><span className="text-[10px] font-bold">导出备份</span></button>
                        <button onClick={()=>{
                            const input = document.createElement('input'); input.type='file';
                            input.onchange = e => {
                                const file = e.target.files[0];
                                const reader = new FileReader();
                                reader.onload = re => {
                                    try {
                                        const data = JSON.parse(re.target.result);
                                        setStations(data);
                                    } catch(err) {
                                        alert('无效的 JSON 文件');
                                    }
                                };
                                reader.readAsText(file);
                            };
                            input.click();
                        }} className="flex flex-col items-center gap-2 p-4 bg-theme rounded-2xl"><Icons.Plus className="w-6 h-6 opacity-40"/><span className="text-[10px] font-bold">恢复数据</span></button>
                    </div>
                </section>
                <div className="text-center pt-8">
                    <p className="text-[10px] font-bold opacity-20 uppercase tracking-widest">Transistor Radio v4.5.6 Standalone</p>
                </div>
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
